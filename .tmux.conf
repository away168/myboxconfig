set-option -sa terminal-overrides ",screen*:Tc"
set -g default-terminal "screen-256color"
set-option -a terminal-features 'screen-256color:RGB'

unbind r
bind r source-file ~/.tmux.conf; display "tmux.conf reloaded!"

#set -g prefix C-t
# Start windows and panes index at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

set -g history-limit 5000

set-option -g status-position top
#set-option -g allow-rename off

#unbind %
#bind | split-window -h

#unbind '"'
#bind - split-window -v

bind -r j resize-pane -D 3
bind -r k resize-pane -U 3
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"


bind-key "f" run-shell 'TMP="$(mktemp /tmp/tmux_scrollback.XXXXXX)"; tmux capture-pane -S - -E -; tmux save-buffer "$TMP"; tmux delete-buffer; tmux display-popup -E -w 90% -h 90% "nvim \"$TMP\""'

# bind-key "f" run-shell 'TMP="$(mktemp /tmp/tmux_scrollback.XXXXXX)"; tmux capture-pane -S - -E -; tmux save-buffer "$TMP"; tmux delete-buffer; tmux send-keys "nvim $TMP" C-m'
#
# tpm plugin

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'catppuccin/tmux'
#set -g @plugin 'fabioluciano/tmux-tokyo-night'
#set -g @plugin 'xamut/tmux-weather'
set -g @plugin 'tmux-plugins/tpm'

## catpuccin config 3
#set -g @catppuccin_flavour 'latte'
set -g @catppuccin_window_status_style "rounded"
# set -g @catppuccin_window_left_separator ""
# set -g @catppuccin_window_right_separator " "
# set -g @catppuccin_window_middle_separator " █"
# set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

set -g @catppuccin_status_modules_right "host session"
# set -g @catppuccin_status_left_separator  ""
# set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "yes"
#
# set -g @catppuccin_directory_text "#{b:pane_current_path}"

## other plugin settings
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

### 
set-option -g allow-rename off
set-window-option -g automatic-rename off
set-option -g automatic-rename off

# must keep at the end
run '~/.tmux/plugins/tpm/tpm'
